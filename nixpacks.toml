[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.curl",
  "php84Extensions.pdo",
  "php84Extensions.pdo_mysql",
  "php84Extensions.tokenizer",
  "php84Extensions.fileinfo",
  "php84Extensions.openssl",
  "php84Extensions.gd",
  "php84Extensions.zip",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"